# Blueprint Render — 2 services séparés (API + Web) + base Postgres
# Doc : https://render.com/docs/blueprint-spec
databases:
  - name: vaulty-db
    databaseName: vaulty
    user: vaulty
    plan: free

services:
  # --- Backend : API Node ---
  - type: web
    name: vaulty-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaulty-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AUTO_MIGRATE
        value: "true"

  # --- Frontend : nginx (sert Angular + proxy /api -> vaulty-api) ---
  - type: web
    name: vaulty-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # URL publique complète du backend (avec https://), ex :
      # https://vaulty-backend-xxxx.onrender.com  — à définir dans le dashboard.
      - key: BACKEND_ORIGIN
        sync: false
