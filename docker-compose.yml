services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaulty
      POSTGRES_PASSWORD: vaulty
      POSTGRES_DB: vaulty
    ports:
      # 5433 côté hôte pour ne pas entrer en conflit avec un Postgres natif sur 5432
      - "5433:5432"
    volumes:
      - vaulty_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaulty"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://vaulty:vaulty@db:5432/vaulty
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      AUTO_MIGRATE: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    environment:
      PORT: 8080
      BACKEND_HOSTPORT: api:3000
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  vaulty_pgdata:
